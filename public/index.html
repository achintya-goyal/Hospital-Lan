<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Secure LAN</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:#1e293b}
  ::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
  .tab-btn.active{background:#1d4ed8;color:#fff}
  .dept-badge{font-size:10px;padding:2px 6px;border-radius:9999px;font-weight:600}
  .log-JOIN{border-left:3px solid #22c55e}
  .log-LEAVE{border-left:3px solid #ef4444}
  .log-CALL_START,.log-CALL_END{border-left:3px solid #a78bfa}
  .log-CHAT{border-left:3px solid #38bdf8}
  .log-FILE_TRANSFER{border-left:3px solid #fb923c}
  video{background:#000}
  #login-screen{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)}
</style>
</head>
<body class="bg-slate-900 text-white h-screen overflow-hidden flex flex-col font-sans">

<!-- ══ LOGIN SCREEN ══════════════════════════════════════════════════════════ -->
<div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center">
  <div class="bg-slate-800 border border-slate-600 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🏥</div>
      <h1 class="text-2xl font-bold text-white">Hospital Secure LAN</h1>
      <p class="text-slate-400 text-sm mt-1">Internal communication network</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm text-slate-300 mb-1">Full Name</label>
        <input id="login-name" type="text" placeholder="Dr. Jane Smith"
          class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm text-slate-300 mb-1">Department</label>
        <select id="login-dept" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="">Select department…</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-slate-300 mb-1">Role</label>
        <select id="login-role" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="">Select role…</option>
        </select>
      </div>
      <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition-all py-3 rounded-lg font-semibold mt-2">
        Join Network
      </button>
      <p id="login-err" class="text-red-400 text-xs text-center hidden">Please fill in all fields.</p>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══════════════════════════════════════════════════════════════ -->
<div id="main-app" class="hidden flex-col h-screen">

  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 py-2.5 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <span class="text-xl">🏥</span>
      <div>
        <h1 class="text-sm font-bold leading-tight">Hospital Secure LAN</h1>
        <p id="user-badge" class="text-xs text-slate-400"></p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div id="telemetry" class="text-xs text-slate-400 font-mono">RTT: <span id="rtt-val">–</span>ms</div>
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        <span id="online-count" class="text-xs text-slate-300">0 online</span>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- Left sidebar: Users -->
    <aside class="w-52 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0 overflow-hidden">
      <div class="px-3 py-2 border-b border-slate-700 text-xs font-semibold text-slate-400 uppercase tracking-wide">Staff Online</div>
      <div id="user-list" class="flex-1 overflow-y-auto p-2 space-y-1 text-xs"></div>
    </aside>

    <!-- Center: Video + controls -->
    <section class="flex-1 flex flex-col relative overflow-hidden bg-slate-950">
      <div id="video-grid" class="flex-1 grid gap-2 p-3 overflow-hidden"></div>

      <!-- Local video always present -->
      <div id="local-video-wrap" class="hidden absolute top-3 right-3 w-36 h-28 rounded-xl overflow-hidden border-2 border-blue-500 shadow-xl z-10">
        <video id="local-video" class="w-full h-full object-cover scale-x-[-1]" autoplay muted playsinline></video>
        <div class="absolute bottom-1 left-1 bg-black/70 px-1.5 py-0.5 rounded text-[10px]" id="local-name-tag">You</div>
      </div>

      <!-- Controls -->
      <div class="shrink-0 flex items-center justify-center gap-3 py-3 border-t border-slate-800 bg-slate-900">
        <button id="btn-video" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 transition text-xs" title="Toggle camera">
          <span class="text-lg">🎥</span><span>Camera</span>
        </button>
        <button id="btn-audio" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 transition text-xs" title="Toggle mic">
          <span class="text-lg">🎤</span><span>Mic</span>
        </button>
        <button id="btn-screen" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl bg-blue-700 hover:bg-blue-600 transition text-xs">
          <span class="text-lg">💻</span><span>Screen</span>
        </button>
        <button id="btn-hangup" class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl bg-red-700 hover:bg-red-600 transition text-xs hidden">
          <span class="text-lg">📵</span><span>Hang up</span>
        </button>
      </div>
    </section>

    <!-- Right sidebar: Tabs (Chat / Files / Logs) -->
    <aside class="w-80 bg-slate-800 border-l border-slate-700 flex flex-col shrink-0">

      <!-- Tab bar -->
      <div class="flex border-b border-slate-700 shrink-0">
        <button class="tab-btn active flex-1 py-2.5 text-xs font-semibold" data-tab="chat">💬 Chat</button>
        <button class="tab-btn flex-1 py-2.5 text-xs font-semibold" data-tab="files">📁 Docs</button>
        <button class="tab-btn flex-1 py-2.5 text-xs font-semibold" data-tab="logs">📋 Logs</button>
      </div>

      <!-- Chat tab -->
      <div id="tab-chat" class="flex-1 flex flex-col overflow-hidden">
        <div class="px-3 py-2 border-b border-slate-700 flex items-center gap-2 shrink-0">
          <span class="text-xs text-slate-400">Channel:</span>
          <select id="chat-channel" class="bg-slate-700 border-0 rounded px-2 py-1 text-xs flex-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
            <option value="all">🏥 All Staff</option>
          </select>
        </div>
        <div id="chat-messages" class="flex-1 p-3 overflow-y-auto space-y-2 text-xs"></div>
        <div class="p-3 border-t border-slate-700 flex gap-2 shrink-0">
          <input id="chat-input" type="text" placeholder="Type a message…"
            class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-blue-500">
          <button id="chat-send" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded-lg text-xs font-semibold">Send</button>
        </div>
      </div>

      <!-- Files tab -->
      <div id="tab-files" class="hidden flex-1 flex flex-col overflow-hidden">
        <div class="p-3 border-b border-slate-700 shrink-0">
          <p class="text-xs text-slate-400 mb-2">Send document to peer (direct P2P, encrypted in transit)</p>
          <div class="space-y-2">
            <select id="file-target" class="w-full bg-slate-700 border-0 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
              <option value="">Select recipient…</option>
            </select>
            <input type="file" id="file-input" class="hidden">
            <label for="file-input" class="block w-full text-center p-3 border border-dashed border-slate-500 rounded-lg text-xs text-slate-300 hover:bg-slate-700 cursor-pointer transition">
              📎 Choose file to send
            </label>
            <div id="file-progress" class="hidden">
              <div class="flex justify-between text-xs text-slate-400 mb-1">
                <span id="file-progress-name">Sending…</span>
                <span id="file-progress-pct">0%</span>
              </div>
              <div class="w-full bg-slate-700 rounded-full h-1.5">
                <div id="file-progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all" style="width:0%"></div>
              </div>
            </div>
          </div>
        </div>
        <div id="file-log" class="flex-1 p-3 overflow-y-auto space-y-2 text-xs"></div>
      </div>

      <!-- Logs tab -->
      <div id="tab-logs" class="hidden flex-1 flex flex-col overflow-hidden">
        <div class="px-3 py-2 border-b border-slate-700 flex items-center gap-2 shrink-0">
          <span class="text-xs text-slate-400">Filter:</span>
          <select id="log-filter" class="bg-slate-700 border-0 rounded px-2 py-1 text-xs flex-1 focus:outline-none">
            <option value="all">All events</option>
            <option value="JOIN">Joins</option>
            <option value="LEAVE">Leaves</option>
            <option value="CALL_START">Calls</option>
            <option value="CHAT">Chat</option>
            <option value="FILE_TRANSFER">File transfers</option>
          </select>
        </div>
        <div id="log-entries" class="flex-1 p-2 overflow-y-auto space-y-1 text-xs font-mono"></div>
      </div>

    </aside>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
